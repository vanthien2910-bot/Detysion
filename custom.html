<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETYSON | Cá Nhân Hóa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
        <nav class="nav-left">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="custom.html">Custom</a>
        </nav>
        <div class="logo-center">
            <a href="index.html"><img src="/6581d064-bc5e-40ae-8182-502bc7ef26fb.jpg" alt="DETYSON" class="logo-img"></a>
        </div>
        <nav class="nav-right">
            <!-- Icon tìm kiếm chảy ngang mới -->
            <div class="search-wrapper">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" class="search-input" placeholder="Bạn cần tìm gì?">
            </div>
            <a href="account.html">Account</a>
            <a href="cart.html">Cart (0)</a>
        </nav>
    </header>
    <div class="custom-layout">
        <div class="custom-preview">
            <img src="/sddđ.png" alt="Mockup Áo" id="tshirt-mockup">
        </div>

        <div class="custom-controls">
            <h2 style="font-size: 24px; font-weight: 800; text-transform: uppercase; margin-bottom: 30px;">Tạo chất riêng</h2>
            
            <div class="control-group">
                <h3>1. Chọn màu áo</h3>
                <div class="color-options">
                    <div class="color-dot bg-white active"></div>
                    <div class="color-dot bg-black"></div>
                    <div class="color-dot bg-burgundy"></div>
                </div>
            </div>

            <div class="control-group">
                <h3>2. Họa tiết văn hóa</h3>
                <div class="pattern-options">
                    <div class="pattern-box active">Trống Đồng</div>
                    <div class="pattern-box">Hoa Sen</div>
                    <div class="pattern-box">Rồng thời Lý</div>
                    <div class="pattern-box">Chim Lạc</div>
                </div>
            </div>

            <div class="control-group">
                <h3>3. Vị trí in</h3>
                <select style="width: 100%; padding: 10px; border: 1px solid #ccc; font-family: 'Inter';">
                    <option>Ngực trái (Logo nhỏ)</option>
                    <option>Chính giữa ngực (Bản to)</option>
                    <option>Sau lưng</option>
                </select>
            </div>

            <button class="btn btn-primary" style="width: 100%; margin-top: 20px;">Thêm vào giỏ - 750,000 VND</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
